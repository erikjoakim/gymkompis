{% extends "base.html" %}

{% block title %}Create Program Draft | GymKompis{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Create an empty program draft</h1>
        <p>Start with the plan basics, then add days and exercises or let AI help later.</p>
    </div>
</div>
<div class="card narrow">
    <form method="post" class="stack">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create draft</button>
    </form>
</div>
{% endblock %}
